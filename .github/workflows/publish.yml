name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  update-examples:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run integration test
        run: uv run pytest --integration
        env:
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}

      - name: Regenerate examples
        run: |
          git rm --ignore-unmatch -r examples/*.png
          uv run python scripts/gen_examples.py

      - name: Commit and push updated examples
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examples/
          if git diff --cached --quiet; then
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update examples for ${{ github.ref_name }} [skip ci]"
            git push
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: update-examples
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-examples.outputs.sha }}

      - uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
